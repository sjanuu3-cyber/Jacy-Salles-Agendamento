<script>
const bookingForm = document.getElementById("bookingForm");
const dateInput = document.getElementById("date");
const timeSelect = document.getElementById("time");
const availabilityMessage = document.getElementById("availabilityMessage");
const totalAmount = document.getElementById("totalAmount");
const successMessage = document.getElementById("successMessage");
const serviceCheckboxes = document.querySelectorAll('input[name="service"]');

/* ================= LOGIN ================= */

function login() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    fetch("/api/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ user, pass })
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(() => {
        localStorage.setItem("admin", "true");
        alert("Login realizado!");
        location.reload();
    })
    .catch(() => {
        alert("Login inválido");
    });
}

function logout() {
    localStorage.removeItem("admin");
    location.reload();
}

function checkAdmin() {
    const isAdmin = localStorage.getItem("admin");
    const panel = document.querySelector(".manager-panel");

    if (panel) {
        panel.style.display = isAdmin === "true" ? "block" : "none";
    }
}

checkAdmin();

/* ================= TOTAL ================= */

function updateTotal() {
    let total = 0;

    serviceCheckboxes.forEach(cb => {
        if (cb.checked) total += Number(cb.value);
    });

    totalAmount.textContent = `R$ ${total.toFixed(2).replace(".", ",")}`;
}

/* ================= DISPONIBILIDADE ================= */

async function loadAvailability(date) {
    if (!date) return;

    availabilityMessage.textContent = "Carregando horários...";

    try {
        const res = await fetch(`/api/availability?date=${date}`);
        const data = await res.json();

        timeSelect.innerHTML = "";

        if (!data.available || data.available.length === 0) {
            timeSelect.innerHTML = `<option>Sem horários</option>`;
            timeSelect.disabled = true;
            availabilityMessage.textContent = "Sem horários disponíveis";
            return;
        }

        timeSelect.disabled = false;

        timeSelect.innerHTML = `<option value="">Selecione um horário</option>`;

        data.available.forEach(time => {
            const opt = document.createElement("option");
            opt.value = time;
            opt.textContent = time;
            timeSelect.appendChild(opt);
        });

        availabilityMessage.textContent =
            `${data.weekdayLabel} com ${data.available.length} horário(s) disponível(is)`;

    } catch (err) {
        availabilityMessage.textContent = "Erro ao carregar horários";
    }
}

/* ================= EVENTOS ================= */

dateInput.addEventListener("change", () => {
    loadAvailability(dateInput.value);
});

serviceCheckboxes.forEach(cb => {
    cb.addEventListener("change", updateTotal);
});

/* ================= AGENDAMENTO ================= */

bookingForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const services = [...serviceCheckboxes]
        .filter(cb => cb.checked)
        .map(cb => ({
            name: cb.dataset.name,
            price: Number(cb.value)
        }));

    if (services.length === 0) {
        alert("Selecione pelo menos um serviço");
        return;
    }

    if (!timeSelect.value) {
        alert("Escolha um horário");
        return;
    }

    const body = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        date: dateInput.value,
        time: timeSelect.value,
        services,
        total: totalAmount.textContent,
        notes: document.getElementById("notes").value
    };

    try {
        const res = await fetch("/api/bookings", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
        });

        const data = await res.json();

        if (res.status === 409) {
            alert("Esse horário já foi reservado!");
            loadAvailability(body.date);
            return;
        }

        if (!res.ok) {
            throw new Error(data.error);
        }

        successMessage.style.display = "block";

        const msg =
`🦋 *Novo Agendamento - Jacy Sallys* 🦋

👤 Nome: ${body.name}
📅 Data: ${body.date}
🕐 Horário: ${body.time}

💅 Serviços:
${services.map(s => "• " + s.name).join("\n")}

💰 Total: ${body.total}`;

        window.open(
            `https://wa.me/5575981754628?text=${encodeURIComponent(msg)}`,
            "_blank"
        );

        bookingForm.reset();
        updateTotal();
        loadAvailability(body.date);

        setTimeout(() => {
            successMessage.style.display = "none";
        }, 3000);

    } catch (err) {
        alert("Erro ao salvar agendamento");
    }
});

/* INIT */
updateTotal();
</script>
